name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Triggers whenever you push to main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # change to yarn or pnpm if needed

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build # Makes sure this generates a dist/ or build/ folder

      - name: Upload production artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro/Vite output to 'dist'. Change to 'build' if using traditional CRA.
          path: ./dist 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4